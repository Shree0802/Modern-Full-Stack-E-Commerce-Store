<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account – ShopSphere</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/dark-mode.css">
  <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="container navbar-container">
      <a href="/" class="brand-logo"><div class="brand-icon">🛍️</div>Shop<span>Sphere</span></a>
      <ul class="nav-menu" id="nav-menu">
        <li><a href="/" class="nav-link">Home</a></li>
        <li><a href="/products" class="nav-link">Products</a></li>
      </ul>
      <div class="nav-actions">
        <button class="icon-btn" id="theme-toggle-btn">🌙</button>
      </div>
    </div>
  </nav>

  <main class="main-content" style="display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 160px); padding: 2rem 1rem;">
    <div style="width: 100%; max-width: 480px; background-color: var(--color-card-bg); border: 1px solid var(--color-border); border-radius: var(--radius-lg); padding: 2.5rem; box-shadow: var(--shadow-lg);">
      
      <div class="text-center" style="margin-bottom: 2rem;">
        <h1 style="font-size: 1.8rem; margin-bottom: 0.5rem;">Join ShopSphere</h1>
        <p style="color: var(--color-text-muted); font-size: 0.95rem;">Create a free account to track orders and save wishlists.</p>
      </div>

      <form id="register-form">
        <div class="form-group">
          <label class="form-label" for="name">Full Name *</label>
          <input type="text" id="name" class="form-control" placeholder="John Doe" required />
        </div>

        <div class="form-group">
          <label class="form-label" for="email">Email Address *</label>
          <input type="email" id="email" class="form-control" placeholder="john@example.com" required />
        </div>

        <div class="form-group">
          <label class="form-label" for="phone">Phone Number (Optional)</label>
          <input type="tel" id="phone" class="form-control" placeholder="+1 555 019 2831" />
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password *</label>
          <input type="password" id="password" class="form-control" placeholder="At least 6 characters" minlength="6" required />
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.85rem; font-size: 1rem; margin-top: 1rem;">
          Create Account ✨
        </button>
      </form>

      <div class="text-center" style="margin-top: 1.75rem; font-size: 0.9rem; color: var(--color-text-muted);">
        Already have an account? <a href="/login" style="color: var(--color-accent); font-weight: 700;">Sign In</a>
      </div>

    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/toast.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/main.js"></script>
  <script>
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const password = document.getElementById('password').value;

      try {
        await Auth.register(name, email, password, phone);
        setTimeout(() => window.location.href = '/', 500);
      } catch (err) {
        // Handled by Auth toast
      }
    });
  </script>
</body>
</html>
