<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page Not Found (404) – ShopSphere</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/dark-mode.css">
  <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="container navbar-container">
      <a href="/" class="brand-logo"><div class="brand-icon">🛍️</div>Shop<span>Sphere</span></a>
      <ul class="nav-menu" id="nav-menu">
        <li><a href="/" class="nav-link">Home</a></li>
        <li><a href="/products" class="nav-link">Products</a></li>
      </ul>
      <div class="nav-actions">
        <button class="icon-btn" id="theme-toggle-btn">🌙</button>
      </div>
    </div>
  </nav>

  <main class="main-content" style="display: flex; align-items: center; justify-content: center; min-height: calc(100vh - 160px); padding: 2rem;">
    <div class="text-center" style="max-width: 500px;">
      <div style="font-size: 6rem; font-weight: 800; font-family: var(--font-heading); color: var(--color-accent); line-height: 1;">404</div>
      <h1 style="font-size: 2rem; margin: 1rem 0 0.5rem 0;">Oops! Page Not Found</h1>
      <p style="color: var(--color-text-muted); margin-bottom: 2rem;">The page or product link you are looking for might have been moved, deleted, or doesn't exist.</p>
      
      <div style="display: flex; gap: 1rem; justify-content: center;">
        <a href="/" class="btn btn-primary">Return to Homepage</a>
        <a href="/products" class="btn btn-secondary">Explore Products</a>
      </div>
    </div>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/toast.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>
