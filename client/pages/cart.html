<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shopping Cart – ShopSphere</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/dark-mode.css">
  <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="container navbar-container">
      <a href="/" class="brand-logo"><div class="brand-icon">🛍️</div>Shop<span>Sphere</span></a>
      <div class="nav-search">
        <span class="nav-search-icon">🔍</span>
        <input type="text" id="nav-search-input" class="nav-search-input" placeholder="Search catalog..." autocomplete="off">
        <div id="search-suggestions" class="search-suggestions"></div>
      </div>
      <ul class="nav-menu" id="nav-menu">
        <li><a href="/" class="nav-link">Home</a></li>
        <li><a href="/products" class="nav-link">Products</a></li>
        <li><a href="/about" class="nav-link">About</a></li>
        <li><a href="/contact" class="nav-link">Contact</a></li>
      </ul>
      <div class="nav-actions">
        <button class="icon-btn" id="theme-toggle-btn">🌙</button>
        <a href="/cart" class="icon-btn active">🛒<span class="cart-badge-count" style="display:none;">0</span></a>
        <div class="user-menu-container">
          <button class="icon-btn" id="user-menu-btn">👤</button>
          <div class="user-dropdown" id="user-dropdown"></div>
        </div>
        <button class="mobile-menu-toggle" id="mobile-menu-toggle">☰</button>
      </div>
    </div>
  </nav>

  <!-- Cart Page Content -->
  <main class="main-content">
    <section class="section">
      <div class="container">
        <h1 style="font-size: 2.2rem; margin-bottom: 2rem;">Your Shopping Cart</h1>

        <div style="display: grid; grid-template-columns: 1fr 340px; gap: 2.5rem; align-items: start;" id="cart-main-grid">
          
          <!-- Cart Items Table Container -->
          <div id="cart-items-container" style="background: var(--color-card-bg); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 1.5rem;">
            <div class="text-center" style="padding: 3rem;">Loading your cart items...</div>
          </div>

          <!-- Order Summary Card -->
          <div style="background: var(--color-card-bg); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 1.5rem;" id="cart-summary-card">
            <h3 style="margin-bottom: 1.25rem; border-bottom: 1px solid var(--color-border); padding-bottom: 0.75rem;">Summary</h3>
            
            <div style="display: flex; justify-content: space-between; margin-bottom: 0.75rem;">
              <span>Subtotal</span>
              <span id="summary-subtotal" style="font-weight: 700;">₹0</span>
            </div>
            
            <div style="display: flex; justify-content: space-between; margin-bottom: 0.75rem;">
              <span>Est. GST (18%)</span>
              <span id="summary-tax">₹0</span>
            </div>

            <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
              <span>Shipping</span>
              <span id="summary-shipping" style="color: var(--color-success); font-weight: 700;">Calculated at checkout</span>
            </div>

            <div style="display: flex; justify-content: space-between; font-size: 1.3rem; font-weight: 800; border-top: 1.5px solid var(--color-border); padding-top: 1rem; margin-bottom: 1.5rem;">
              <span>Total</span>
              <span id="summary-total" style="color: var(--color-accent); font-family: var(--font-heading);">₹0</span>
            </div>

            <button id="proceed-checkout-btn" class="btn btn-primary" style="width: 100%; padding: 0.9rem;" onclick="window.location.href='/checkout'">
              Proceed To Checkout →
            </button>
          </div>

        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 ShopSphere E-Commerce Store</p>
      </div>
    </div>
  </footer>

  <script src="/js/api.js"></script>
  <script src="/js/toast.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/wishlist.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/main.js"></script>
  <script>
    const formatPrice = (val) => '₹' + Math.round(val).toLocaleString('en-IN');

    async function renderCartPage() {
      const container = document.getElementById('cart-items-container');
      const cart = await CartManager.getCart();

      if (!cart || !cart.items || cart.items.length === 0) {
        container.innerHTML = `
          <div style="text-align: center; padding: 4rem 1rem;">
            <div style="font-size: 3rem; margin-bottom: 1rem;">🛒</div>
            <h3>Your cart is currently empty</h3>
            <p style="color: var(--color-text-muted); margin-bottom: 1.5rem;">Looks like you haven't added anything to your cart yet.</p>
            <a href="/products" class="btn btn-primary">Browse Products Catalog</a>
          </div>
        `;
        document.getElementById('proceed-checkout-btn').disabled = true;
        document.getElementById('summary-subtotal').textContent = '₹0';
        document.getElementById('summary-tax').textContent = '₹0';
        document.getElementById('summary-total').textContent = '₹0';
        return;
      }

      document.getElementById('proceed-checkout-btn').disabled = false;

      let subtotal = 0;

      container.innerHTML = cart.items
        .map((item) => {
          const product = item.product;
          const price = item.price || product.price;
          const lineTotal = price * item.quantity;
          subtotal += lineTotal;

          return `
            <div style="display: flex; gap: 1.5rem; align-items: center; padding: 1rem 0; border-bottom: 1px solid var(--color-border);">
              <img src="${product.image}" alt="${product.name}" style="width: 80px; height: 80px; object-fit: cover; border-radius: var(--radius-md);" />
              <div style="flex: 1;">
                <div style="font-weight: 700; font-size: 1.05rem;">${product.name}</div>
                <div style="color: var(--color-text-muted); font-size: 0.85rem;">${formatPrice(price)} each</div>
              </div>

              <!-- Quantity Control -->
              <div style="display: flex; align-items: center; border: 1px solid var(--color-border); border-radius: var(--radius-md); overflow: hidden;">
                <button style="padding: 0.4rem 0.8rem; border: none; background: transparent; cursor: pointer; font-weight:700;" onclick="updateItemQty('${product._id}', ${item.quantity - 1})">-</button>
                <span style="padding: 0.4rem 0.8rem; font-weight:700;">${item.quantity}</span>
                <button style="padding: 0.4rem 0.8rem; border: none; background: transparent; cursor: pointer; font-weight:700;" onclick="updateItemQty('${product._id}', ${item.quantity + 1})">+</button>
              </div>

              <div style="font-weight: 800; width: 120px; text-align: right; font-family: var(--font-heading);">${formatPrice(lineTotal)}</div>

              <button style="background: none; border: none; color: var(--color-danger); cursor: pointer; font-size: 1.2rem; margin-left: 0.5rem;" onclick="deleteCartItem('${product._id}')" title="Remove item">
                🗑️
              </button>
            </div>
          `;
        })
        .join('');

      const tax = Math.round(subtotal * 0.18);
      const total = subtotal + tax;

      document.getElementById('summary-subtotal').textContent = formatPrice(subtotal);
      document.getElementById('summary-tax').textContent = formatPrice(tax);
      document.getElementById('summary-total').textContent = formatPrice(total);
    }

    async function updateItemQty(productId, newQty) {
      if (newQty < 1) {
        await deleteCartItem(productId);
        return;
      }
      await CartManager.updateQuantity(productId, newQty);
      renderCartPage();
    }

    async function deleteCartItem(productId) {
      await CartManager.removeItem(productId);
      renderCartPage();
    }

    document.addEventListener('DOMContentLoaded', renderCartPage);
  </script>
</body>
</html>
