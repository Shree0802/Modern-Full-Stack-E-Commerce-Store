<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout – ShopSphere</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/dark-mode.css">
  <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="container navbar-container">
      <a href="/" class="brand-logo"><div class="brand-icon">🛍️</div>Shop<span>Sphere</span></a>
      <ul class="nav-menu" id="nav-menu">
        <li><a href="/" class="nav-link">Home</a></li>
        <li><a href="/products" class="nav-link">Products</a></li>
      </ul>
      <div class="nav-actions">
        <button class="icon-btn" id="theme-toggle-btn">🌙</button>
        <div class="user-menu-container">
          <button class="icon-btn" id="user-menu-btn">👤</button>
          <div class="user-dropdown" id="user-dropdown"></div>
        </div>
      </div>
    </div>
  </nav>

  <main class="main-content">
    <section class="section">
      <div class="container">
        <h1 style="font-size: 2.2rem; margin-bottom: 2rem;">Secure Checkout</h1>

        <form id="checkout-form" style="display: grid; grid-template-columns: 1fr 380px; gap: 2.5rem; align-items: start;">
          
          <!-- Shipping & Billing Address Inputs -->
          <div style="background: var(--color-card-bg); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 2rem;">
            <h3 style="margin-bottom: 1.5rem; border-bottom: 1px solid var(--color-border); padding-bottom: 0.75rem;">1. Shipping Address</h3>
            
            <div class="form-group">
              <label class="form-label" for="street">Street Address *</label>
              <input type="text" id="street" class="form-control" placeholder="123 Main St, Apt 4B" required />
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
              <div class="form-group">
                <label class="form-label" for="city">City *</label>
                <input type="text" id="city" class="form-control" placeholder="San Francisco" required />
              </div>
              <div class="form-group">
                <label class="form-label" for="state">State / Province *</label>
                <input type="text" id="state" class="form-control" placeholder="CA" required />
              </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
              <div class="form-group">
                <label class="form-label" for="zipCode">Zip / Postal Code *</label>
                <input type="text" id="zipCode" class="form-control" placeholder="94107" required />
              </div>
              <div class="form-group">
                <label class="form-label" for="country">Country *</label>
                <input type="text" id="country" class="form-control" value="United States" required />
              </div>
            </div>

            <h3 style="margin: 2rem 0 1.5rem 0; border-bottom: 1px solid var(--color-border); padding-bottom: 0.75rem;">2. Payment Method</h3>
            
            <div style="display: flex; flex-direction: column; gap: 1rem;">
              <label style="display: flex; align-items: center; gap: 1rem; border: 1.5px solid var(--color-border); border-radius: var(--radius-md); padding: 1rem; cursor: pointer;">
                <input type="radio" name="paymentMethod" value="Credit Card" checked />
                <div>
                  <div style="font-weight: 700;">Credit / Debit Card</div>
                  <div style="font-size: 0.8rem; color: var(--color-text-muted);">Visa, MasterCard, Amex (Encrypted test payment)</div>
                </div>
              </label>

              <label style="display: flex; align-items: center; gap: 1rem; border: 1.5px solid var(--color-border); border-radius: var(--radius-md); padding: 1rem; cursor: pointer;">
                <input type="radio" name="paymentMethod" value="PayPal" />
                <div>
                  <div style="font-weight: 700;">PayPal Express</div>
                  <div style="font-size: 0.8rem; color: var(--color-text-muted);">Instant redirection</div>
                </div>
              </label>

              <label style="display: flex; align-items: center; gap: 1rem; border: 1.5px solid var(--color-border); border-radius: var(--radius-md); padding: 1rem; cursor: pointer;">
                <input type="radio" name="paymentMethod" value="Cash on Delivery" />
                <div>
                  <div style="font-weight: 700;">Cash on Delivery (COD)</div>
                  <div style="font-size: 0.8rem; color: var(--color-text-muted);">Pay cash upon package arrival</div>
                </div>
              </label>
            </div>
          </div>

          <!-- Right Column: Order Summary & Place Order -->
          <div style="background: var(--color-card-bg); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 1.5rem;">
            <div id="checkout-summary">Loading order summary...</div>

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 1rem; font-size: 1.1rem; margin-top: 1.5rem;">
              Place Order Now 🔒
            </button>
          </div>

        </form>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 ShopSphere E-Commerce Store</p>
      </div>
    </div>
  </footer>

  <script src="/js/api.js"></script>
  <script src="/js/toast.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/cart.js"></script>
  <script src="/js/checkout.js"></script>
  <script src="/js/main.js"></script>
</body>
</html>
