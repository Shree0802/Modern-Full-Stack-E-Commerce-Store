<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Profile – ShopSphere</title>
  <link rel="stylesheet" href="/css/main.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/dark-mode.css">
  <link rel="stylesheet" href="/css/responsive.css">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <div class="container navbar-container">
      <a href="/" class="brand-logo"><div class="brand-icon">🛍️</div>Shop<span>Sphere</span></a>
      <ul class="nav-menu" id="nav-menu">
        <li><a href="/" class="nav-link">Home</a></li>
        <li><a href="/products" class="nav-link">Products</a></li>
      </ul>
      <div class="nav-actions">
        <button class="icon-btn" id="theme-toggle-btn">🌙</button>
        <a href="/cart" class="icon-btn">🛒<span class="cart-badge-count" style="display:none;">0</span></a>
        <div class="user-menu-container">
          <button class="icon-btn" id="user-menu-btn">👤</button>
          <div class="user-dropdown" id="user-dropdown"></div>
        </div>
      </div>
    </div>
  </nav>

  <main class="main-content">
    <section class="section">
      <div class="container">
        
        <!-- Header Banner -->
        <div style="background: var(--gradient-primary); color: #fff; border-radius: var(--radius-lg); padding: 2.5rem; margin-bottom: 2.5rem; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1.5rem;">
          <div>
            <h1 style="color: #fff; font-size: 2rem;" id="user-name-header">User Profile</h1>
            <p id="user-email-header" style="color: #94a3b8; font-size: 1rem;">user@example.com</p>
          </div>
          <button class="btn btn-secondary" style="color:#fff; border-color:rgba(255,255,255,0.4);" onclick="Auth.logout()">
            🚪 Logout Account
          </button>
        </div>

        <div style="display: grid; grid-template-columns: 240px 1fr; gap: 2rem; align-items: start;">
          
          <!-- Profile Sub-navigation -->
          <div style="background: var(--color-card-bg); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 1rem;">
            <button class="btn btn-secondary tab-btn active" data-tab="tab-profile" style="width: 100%; justify-content: flex-start; margin-bottom: 0.5rem;">
              👤 Personal Info
            </button>
            <button class="btn btn-secondary tab-btn" data-tab="tab-orders" style="width: 100%; justify-content: flex-start; margin-bottom: 0.5rem;" onclick="window.location.href='/order-history'">
              📦 Order History
            </button>
            <button class="btn btn-secondary tab-btn" data-tab="tab-wishlist" style="width: 100%; justify-content: flex-start;">
              ♥ Saved Wishlist
            </button>
          </div>

          <!-- Tab Content Sections -->
          <div>
            <!-- Profile Tab -->
            <div id="tab-profile" class="tab-content" style="background: var(--color-card-bg); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 2rem;">
              <h3 style="margin-bottom: 1.5rem; border-bottom: 1px solid var(--color-border); padding-bottom: 0.75rem;">Personal Details & Default Address</h3>
              
              <form id="profile-form">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                  <div class="form-group">
                    <label class="form-label" for="name-input">Full Name</label>
                    <input type="text" id="name-input" class="form-control" required />
                  </div>
                  <div class="form-group">
                    <label class="form-label" for="phone-input">Phone Number</label>
                    <input type="text" id="phone-input" class="form-control" placeholder="+1 555 019 2831" />
                  </div>
                </div>

                <h4 style="margin: 1.5rem 0 1rem 0;">Default Shipping Address</h4>
                <div class="form-group">
                  <label class="form-label" for="street-input">Street Address</label>
                  <input type="text" id="street-input" class="form-control" placeholder="742 Evergreen Terrace" />
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                  <div class="form-group">
                    <label class="form-label" for="city-input">City</label>
                    <input type="text" id="city-input" class="form-control" placeholder="Springfield" />
                  </div>
                  <div class="form-group">
                    <label class="form-label" for="state-input">State / Province</label>
                    <input type="text" id="state-input" class="form-control" placeholder="IL" />
                  </div>
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                  <div class="form-group">
                    <label class="form-label" for="zip-input">Zip / Postal Code</label>
                    <input type="text" id="zip-input" class="form-control" placeholder="62704" />
                  </div>
                  <div class="form-group">
                    <label class="form-label" for="country-input">Country</label>
                    <input type="text" id="country-input" class="form-control" placeholder="United States" />
                  </div>
                </div>

                <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">
                  Save Profile Changes
                </button>
              </form>
            </div>

            <!-- Wishlist Tab -->
            <div id="tab-wishlist" class="tab-content hidden" style="background: var(--color-card-bg); border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 2rem;">
              <h3 style="margin-bottom: 1.5rem;">Your Wishlist</h3>
              <div id="wishlist-content">Loading wishlist...</div>
            </div>
          </div>

        </div>

      </div>
    </section>
  </main>

  <script src="/js/api.js"></script>
  <script src="/js/toast.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/wishlist.js"></script>
  <script src="/js/products.js"></script>
  <script src="/js/profile.js"></script>
  <script src="/js/main.js"></script>
  <script>
    document.querySelectorAll('.tab-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const targetTab = e.currentTarget.dataset.tab;
        if (!targetTab) return;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
        e.currentTarget.classList.add('active');
        document.getElementById(targetTab).classList.remove('hidden');
      });
    });
  </script>
</body>
</html>
